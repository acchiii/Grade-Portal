{% extends 'portal/base.html' %}
{% load static %}
{% block title %}404 - Page Not Found — CEC Grade Portal{% endblock %}

{% block content %}
<div class="page-wrap" style="padding-top:2.5rem;">
  <div class="section-header fade-up" style="text-align:center;">
    <div class="eyebrow" style="font-size:4rem; color:var(--sky);">404</div>
    <h2>Page Not Found</h2>
    <p style="max-width:520px; margin:0 auto 2rem;">The page you're looking for doesn't exist or has been moved. </p>
    <a href="{% url 'index' %}" class="btn btn-gold">← Return to Home</a>
  </div>
</div>
{% endblock %}
